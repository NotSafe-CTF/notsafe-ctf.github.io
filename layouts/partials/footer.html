<footer>
  <div class="footer-inner">
    <p class="footer-copy">
      &copy; {{ now.Year }} <span>{{ .Site.Params.author }}</span> — built with Hugo + GitHub Pages
    </p>
    <div class="footer-links">
      {{ with .Site.Params.github }}<a href="{{ . }}" target="_blank" rel="noopener">github</a>{{ end }}
      {{ with .Site.Params.twitter }}<a href="{{ . }}" target="_blank" rel="noopener">twitter</a>{{ end }}
      {{ with .Site.Params.email }}<a href="mailto:{{ . }}">email</a>{{ end }}
    </div>
  </div>
</footer>
